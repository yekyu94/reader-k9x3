<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TXT 리더">
  <meta name="theme-color" content="#0f172a">
  <meta name="robots" content="noindex, nofollow">
  <title>TXT 리더</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="header">
    <h1 id="title">TXT 리더</h1>
    <button id="btnOpen" class="icon-btn" title="파일 열기">📂</button>
  </header>

  <main id="main">
    <div id="empty" class="empty">
      <p>📖</p>
      <p>txt 파일을 열어서<br>음성으로 들어보세요</p>
      <button id="btnOpenBig" class="primary-btn">파일 열기</button>
      <label class="enc-label">
        인코딩:
        <select id="encoding">
          <option value="auto" selected>자동 감지</option>
          <option value="utf-8">UTF-8</option>
          <option value="euc-kr">EUC-KR (한국어 구형)</option>
          <option value="utf-16le">UTF-16</option>
        </select>
      </label>
      <p class="version">v5</p>
    </div>
    <div id="sentences" class="sentences" hidden></div>
  </main>

  <footer id="controls" hidden>
    <div class="progress-row">
      <span id="progressText">0 / 0</span>
      <input type="range" id="progressBar" min="0" max="0" value="0">
    </div>
    <div class="control-row">
      <button id="btnPrev" class="ctrl-btn" title="이전 문장">⏮</button>
      <button id="btnPlay" class="ctrl-btn play" title="재생/일시정지">▶️</button>
      <button id="btnNext" class="ctrl-btn" title="다음 문장">⏭</button>
    </div>
    <div class="option-row">
      <label>속도
        <select id="rate">
          <option value="0.7">0.7×</option>
          <option value="0.8">0.8×</option>
          <option value="0.9">0.9×</option>
          <option value="1" selected>1.0×</option>
          <option value="1.1">1.1×</option>
          <option value="1.2">1.2×</option>
          <option value="1.3">1.3×</option>
        </select>
      </label>
      <label>음성
        <select id="voice"></select>
      </label>
    </div>
  </footer>

  <input type="file" id="fileInput" accept=".txt,text/plain" hidden>
  <script src="app.js"></script>
</body>
</html>
